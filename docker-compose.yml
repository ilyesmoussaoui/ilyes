services:
  postgres:
    image: postgres:16-alpine
    container_name: gym-saas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gymuser
      POSTGRES_PASSWORD: gympass
      POSTGRES_DB: gym_saas
    ports:
      - "5432:5432"
    volumes:
      - gym_saas_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymuser -d gym_saas"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gym-saas-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://gymuser:gympass@postgres:5432/gym_saas
      JWT_SECRET: change-me-in-production-at-least-32-chars-long
      JWT_EXPIRES_IN: 8h
      REFRESH_SECRET: change-me-refresh-in-production-at-least-32-chars
      REFRESH_EXPIRES_IN: 30d
      COOKIE_SECRET: change-me-cookie-in-production-at-least-32-chars
      COOKIE_SECURE: "false"
      CORS_ORIGIN: http://localhost:5173
      FACE_SERVICE_URL: http://face-service:8001
      FACE_MATCH_THRESHOLD: "0.6"
      BACKUPS_DIR: /data/backups
      BACKUP_CRON: "0 3 * * *"
      BACKUP_RETENTION_DAILY: "30"
      BACKUP_RETENTION_MONTHLY: "12"
      BACKUP_MODE: prisma
      BACKUP_AUTO_ON_PAYMENT: "true"
      SMS_PROVIDER: console
    ports:
      - "4000:4000"
    volumes:
      - gym_saas_photos:/data/photos
      - gym_saas_backups:/data/backups
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4000/api/v1/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  face-service:
    build:
      context: ./face-service
      dockerfile: Dockerfile
    container_name: gym-saas-face-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://gymuser:gympass@postgres:5432/gym_saas
      FACE_MODEL_NAME: buffalo_l
      MATCH_THRESHOLD: "0.45"
      PORT: "8001"
      HOST: 0.0.0.0
    ports:
      - "8001:8001"
    volumes:
      - face_models:/data/models

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gym-saas-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_URL: http://localhost:4000
    ports:
      - "5173:80"

volumes:
  gym_saas_pgdata:
  gym_saas_photos:
  gym_saas_backups:
  face_models:
